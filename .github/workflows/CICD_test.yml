name: API CI Workflow

on:
  push:
    branches: [ "CICDPipe" ]
  pull_request:
    branches: [ "CICDPipe" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [16.x, 18.x, 20.x, 22.x, 23.x]

    steps:
    - uses: actions/checkout@v4

    - name: Set up NodeJS
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install Dependencies
      run: |
        npm init -y
        npm install dotenv typescript @types/node

    - name: Lint
      run: npm run lint

    - name: Run Tests
      run: npm test

    - name: Build
      run: npm run build

    - name: Prepare Production Bundle
      run: |
        rm -rf node_modules
        npm ci --only=production
        zip -r function.zip dist node_modules package.json

